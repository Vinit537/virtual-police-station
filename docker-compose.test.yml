services:
  mysql-test:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: vps_test
      MYSQL_USER: vps_test
      MYSQL_PASSWORD: vps_test
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
