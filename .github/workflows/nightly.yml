name: Nightly Regression

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  backend-full:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: vps_test
          MYSQL_USER: vps_test
          MYSQL_PASSWORD: vps_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Run all backend tests
        env:
          TEST_DB_URL: jdbc:mysql://127.0.0.1:3306/vps_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          TEST_DB_USER: vps_test
          TEST_DB_PASSWORD: vps_test
        run: mvn -f backend/pom.xml test -Dtest.includeTags=unit,integration,security,perf
      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-nightly-reports
          path: backend/target/surefire-reports

  e2e-nightly:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: vps_test
          MYSQL_USER: vps_test
          MYSQL_PASSWORD: vps_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: frontend
      - name: Start backend
        env:
          TEST_DB_URL: jdbc:mysql://127.0.0.1:3306/vps_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          TEST_DB_USER: vps_test
          TEST_DB_PASSWORD: vps_test
        run: |
          mvn -f backend/pom.xml spring-boot:run -Dspring-boot.run.profiles=test > backend.log 2>&1 &
      - name: Start frontend
        run: |
          npm run build
          npm run preview -- --host --port 5173 > frontend.log 2>&1 &
        working-directory: frontend
      - name: Wait for services
        run: npx wait-on@7.1.0 http://localhost:8080/actuator/health http://localhost:5173
      - name: Run Playwright tests
        env:
          PLAYWRIGHT_API_URL: http://localhost:8080/api
          PLAYWRIGHT_BASE_URL: http://localhost:5173
        run: npm run test:e2e
        working-directory: frontend
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-playwright-report
          path: frontend/playwright-report
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-playwright-results
          path: frontend/test-results

  performance-nightly:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: vps_test
          MYSQL_USER: vps_test
          MYSQL_PASSWORD: vps_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Start backend
        env:
          TEST_DB_URL: jdbc:mysql://127.0.0.1:3306/vps_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          TEST_DB_USER: vps_test
          TEST_DB_PASSWORD: vps_test
        run: |
          mvn -f backend/pom.xml spring-boot:run -Dspring-boot.run.profiles=test > backend.log 2>&1 &
      - name: Wait for backend
        run: npx wait-on@7.1.0 http://localhost:8080/actuator/health
      - name: Run k6 smoke
        uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/perf/k6-smoke.js
        env:
          K6_BASE_URL: http://localhost:8080/api
